services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    command: rails server -b 0.0.0.0
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - redis
      - mongo
    volumes:
      - .:/app

  sidekiq:
    build: .
    command: bundle exec sidekiq -C config/sidekiq.yml
    env_file: .env
    depends_on:
      - redis
      - mongo
    volumes:
      - .:/app

volumes:
  mongo_data:
