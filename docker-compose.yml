services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: rails server -b 0.0.0.0
    ports:
      - "3000:3000"
    env_file: .env
    networks:
      - default
      - kong-net
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    extra_hosts:
      - "mongo1:host-gateway"
      - "mongo2:host-gateway"
      - "mongo3:host-gateway"

  sidekiq:
    build: .
    command: bundle exec sidekiq -C config/sidekiq.yml
    env_file: .env
    networks:
      - default
      - kong-net
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    extra_hosts:
      - "mongo1:host-gateway"
      - "mongo2:host-gateway"
      - "mongo3:host-gateway"

  prototype-api:
    build: ./prototype-api
    command: rails server -b 0.0.0.0 -p 3001
    ports:
      - "3001:3001"
    env_file: ./prototype-api/.env
    networks:
      - default
      - kong-net
    volumes:
      - ./prototype-api:/app

networks:
  kong-net:
    external: true
